<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상품 상세</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #fff; padding: 24px; max-width: 960px; }
    .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
    .gallery-main { width: 100%; aspect-ratio: 1; background: #e8e8e8; border-radius: 8px; margin-bottom: 8px; }
    .gallery-thumbs { display: flex; gap: 8px; }
    .thumb { width: 56px; height: 56px; background: #e0e0e0; border-radius: 4px; border: 2px solid transparent; }
    .thumb.active { border-color: #C70036; }
    .info h1 { font-size: 18px; margin-bottom: 4px; }
    .brand { font-size: 13px; color: #999; margin-bottom: 12px; }
    hr { border: none; border-top: 1px solid #eee; margin: 12px 0; }
    .price-row { margin-bottom: 4px; }
    .original { font-size: 14px; color: #999; text-decoration: line-through; }
    .discount { font-size: 20px; font-weight: 700; color: #C70036; }
    .discount-rate { font-size: 14px; color: #C70036; margin-left: 4px; }
    .option-label { font-size: 13px; font-weight: 600; margin-bottom: 6px; margin-top: 12px; }
    .colors { display: flex; gap: 8px; }
    .color-dot { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #ddd; }
    .color-dot.selected { border-color: #C70036; }
    .btn-group { display: flex; gap: 8px; margin-top: 16px; }
    .btn { flex: 1; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 600; text-align: center; border: none; cursor: pointer; }
    .btn-outline { background: #fff; border: 1px solid #ddd; color: #333; }
    .btn-primary { background: #C70036; color: #fff; }
    [data-feature] { position: relative; }
  </style>
</head>
<body>
  <div class="layout">
    <div data-feature="GALLERY">
      <div class="gallery-main"></div>
      <div class="gallery-thumbs">
        <div class="thumb active"></div>
        <div class="thumb"></div>
        <div class="thumb"></div>
        <div class="thumb"></div>
      </div>
    </div>
    <div class="info">
      <div data-feature="INFO">
        <h1>프리미엄 무선 이어폰 Pro Max</h1>
        <div class="brand">SoundTech</div>
        <hr>
        <div class="price-row"><span class="original">89,000원</span></div>
        <div><span class="discount">69,000원</span><span class="discount-rate">22%</span></div>
      </div>
      <hr>
      <div data-feature="OPTION">
        <div class="option-label">색상</div>
        <div class="colors">
          <div class="color-dot selected" style="background:#333"></div>
          <div class="color-dot" style="background:#fff"></div>
          <div class="color-dot" style="background:#1a237e"></div>
        </div>
        <div class="option-label">사이즈</div>
        <select style="width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;font-size:13px;">
          <option>선택하세요</option>
        </select>
      </div>
      <div class="btn-group">
        <button class="btn btn-outline">장바구니 담기</button>
        <button class="btn btn-primary">바로 구매</button>
      </div>
    </div>
  </div>
</body>
</html>
